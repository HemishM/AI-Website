<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CollabrAI</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="hero-bg min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md mx-auto px-6">

    <!-- Logo -->
    <a href="index.html" class="flex items-center justify-center gap-2 no-underline mb-8">
      <img src="logo.png" alt="CollabrAI" style="height: 36px;">
    </a>

    <!-- Card -->
    <div class="card" style="padding: 40px;">
      <h1 class="text-2xl font-bold text-white text-center mb-2">Welcome to CollabrAI</h1>
      <p class="text-slate-400 text-sm text-center mb-8">Sign in to track your group project contributions</p>

      <!-- Google Sign In -->
      <button id="google-btn" onclick="signInWithGoogle()" style="
        width: 100%;
        background: white;
        color: #1e293b;
        border: none;
        border-radius: 8px;
        padding: 13px 20px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: opacity 0.2s;
        font-family: 'Inter', sans-serif;
      " onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
        <!-- Google logo SVG -->
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div style="flex:1; height:1px; background:#1a2a45;"></div>
        <span class="text-slate-600 text-xs">or</span>
        <div style="flex:1; height:1px; background:#1a2a45;"></div>
      </div>

      <!-- Email/Password form -->
      <form id="auth-form" class="flex flex-col gap-3">
        <input type="email" id="auth-email" class="form-input" placeholder="Email address" required />
        <input type="password" id="auth-password" class="form-input" placeholder="Password (min 6 characters)" required />
        <button type="submit" id="auth-submit" class="btn-primary w-full text-center">Create Account</button>
      </form>

      <!-- Error message -->
      <div id="auth-error" style="display:none; color:#f87171; font-size:13px; margin-top:10px; text-align:center;"></div>

      <!-- Toggle login/signup -->
      <p class="text-center text-slate-500 text-sm mt-5">
        Already have an account?
        <button onclick="toggleMode()" id="toggle-btn" style="background:none; border:none; color:#60a5fa; cursor:pointer; font-size:14px; font-weight:500;">Sign in instead</button>
      </p>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">
      By continuing, you agree to CollabrAI's Terms of Service and Privacy Policy.
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    let isSignUp = true;

    // Check if user is already logged in
    async function checkSession() {
      const { data: { session } } = await dbClient.auth.getSession();
      if (session) {
        await redirectAfterLogin(session.user);
      }
    }
    checkSession();

    // Handle OAuth callback
    dbClient.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        await redirectAfterLogin(session.user);
      }
    });

    async function redirectAfterLogin(user) {
      // Check if user has completed onboarding
      const { data: profile } = await dbClient
        .from('profiles')
        .select('onboarded')
        .eq('id', user.id)
        .single();

      if (!profile || !profile.onboarded) {
        window.location.href = 'onboarding.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    async function signInWithGoogle() {
      const { error } = await dbClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
          scopes: 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/documents.readonly',
          redirectTo: window.location.origin + '/onboarding.html'
        }
      });
      if (error) showError(error.message);
    }

    // Email/password auth
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const btn = document.getElementById('auth-submit');
      btn.textContent = 'Please wait...';
      btn.disabled = true;

      let result;
      if (isSignUp) {
        result = await dbClient.auth.signUp({ email, password });
      } else {
        result = await dbClient.auth.signInWithPassword({ email, password });
      }

      if (result.error) {
        showError(result.error.message);
        btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
        btn.disabled = false;
      } else if (isSignUp && !result.data.session) {
        // Email confirmation required
        showError('Check your email to confirm your account, then sign in.');
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    });

    function toggleMode() {
      isSignUp = !isSignUp;
      document.getElementById('auth-submit').textContent = isSignUp ? 'Create Account' : 'Sign In';
      document.getElementById('toggle-btn').textContent = isSignUp ? 'Sign in instead' : 'Create an account';
      document.querySelector('p.text-center.text-slate-500').childNodes[0].textContent = isSignUp ? 'Already have an account? ' : "Don't have an account? ";
      document.getElementById('auth-error').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
