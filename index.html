  <!-- Supabase CDN -->
  <script>
    let isYearly = false;
    function toggleBilling() {
      isYearly = !isYearly;
      const knob = document.getElementById('toggle-knob');
      knob.style.transform = isYearly ? 'translateX(22px)' : 'translateX(0)';

      if (isYearly) {
        document.getElementById('price-classroom').textContent = '$250';
        document.getElementById('period-classroom').textContent = '/yr';
        document.getElementById('desc-classroom').textContent = 'Per professor — 2 months free';
        document.getElementById('price-business').textContent = '$500';
        document.getElementById('period-business').textContent = '/yr';
        document.getElementById('desc-business').textContent = 'For small teams — 2 months free';
        document.getElementById('label-yearly').style.color = '#f1f5f9';
        document.getElementById('label-monthly').style.color = '#64748b';
      } else {
        document.getElementById('price-classroom').textContent = '$25';
        document.getElementById('period-classroom').textContent = '/mo';
        document.getElementById('desc-classroom').textContent = 'Per professor, unlimited groups';
        document.getElementById('price-business').textContent = '$50';
        document.getElementById('period-business').textContent = '/mo';
        document.getElementById('desc-business').textContent = 'For small teams and startups';
        document.getElementById('label-monthly').style.color = '#f1f5f9';
        document.getElementById('label-yearly').style.color = '#64748b';
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    // ============================================================
    // EMAIL CAPTURE FORM — stores submissions in Supabase
    // REPLACE: Make sure your Supabase "waitlist" table has columns:
    //   - id (auto), name (text), email (text), created_at (timestamp)
    // ============================================================
    const form = document.getElementById('email-form');
    const confirmMsg = document.getElementById('confirm-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name  = document.getElementById('form-name').value.trim();
      const email = document.getElementById('form-email').value.trim();

      try {
        const { error } = await dbClient
          .from('waitlist')   // REPLACE: change table name if different
          .insert([{ name, email }]);

        if (error) throw error;

        form.style.display = 'none';
        confirmMsg.style.display = 'block';
      } catch (err) {
        console.error(err);
        // Fallback: show confirmation anyway so UX doesn't break
        form.style.display = 'none';
        confirmMsg.style.display = 'block';
      }
    });
  </script>

</body>
